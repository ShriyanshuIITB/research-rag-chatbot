<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Paper Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
    
    .header {
      background: #1a3a5c;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p { font-size: 12px; opacity: 0.8; }

    .container {
      display: flex;
      height: calc(100vh - 64px);
    }

    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e0e0e0;
      padding: 16px;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .paper-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 6px;
      font-size: 14px;
      border: 1px solid #e0e0e0;
      transition: all 0.2s;
    }
    .paper-item:hover { background: #f0f4f8; }
    .paper-item.active { background: #1a3a5c; color: white; border-color: #1a3a5c; }

    .admin-btn {
      width: 100%;
      padding: 8px;
      background: #f0f4f8;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 16px;
      color: #1a3a5c;
      font-weight: 500;
    }
    .admin-btn:hover { background: #e0e8f0; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .welcome {
      padding: 32px;
      background: white;
      margin: 24px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }
    .welcome h2 { color: #1a3a5c; margin-bottom: 8px; }
    .welcome p { color: #666; font-size: 14px; line-height: 1.6; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .message {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
    }
    .message.user { flex-direction: row-reverse; }
    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user .message-content {
      background: #1a3a5c;
      color: white;
    }
    .message.assistant .message-content {
      background: white;
      border: 1px solid #e0e0e0;
      color: #333;
    }

    .input-area {
      padding: 16px 24px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus { border-color: #1a3a5c; }
    .input-area button {
      padding: 10px 20px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .input-area button:hover { background: #15304d; }

    /* Admin Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-box {
      background: white;
      padding: 32px;
      border-radius: 8px;
      width: 420px;
    }
    .modal-box h3 { margin-bottom: 20px; color: #1a3a5c; }
    .modal-box input, .modal-box select {
      width: 100%;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .modal-box button {
      width: 100%;
      padding: 10px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .modal-box .cancel {
      background: #f0f0f0;
      color: #333;
    }
    .status { font-size: 13px; color: #666; margin-top: 8px; }
    .status.success { color: green; }
    .status.error { color: red; }

    .no-paper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 15px;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>📄 Research Paper Chatbot</h1>
    <p>Ask questions from any uploaded research paper</p>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <button class="admin-btn" onclick="openAdmin()">⚙️ Professor Login</button>
    <h3>Available Papers</h3>
    <div id="paperList">Loading...</div>
  </div>

  <div class="main" id="mainArea">
    <div class="no-paper" id="noPaper">
      ← Select a paper from the sidebar to start chatting
    </div>
    <div id="chatSection" style="display:none; flex-direction:column; flex:1;">
      <div class="welcome" id="welcomeBox">
        <h2 id="paperTitleDisplay">Paper Title</h2>
        <p>Ask me anything about this research paper. I will answer based only on its contents.</p>
      </div>
      <div class="chat-area" id="chatArea"></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask a question about this paper..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div class="modal" id="adminModal">
  <div class="modal-box">
    <h3>Professor Upload Panel</h3>
    <input type="password" id="adminPass" placeholder="Enter admin password">
    <input type="text" id="paperTitleInput" placeholder="Paper title (e.g. Income Transfer Policies 2026)">
    <input type="file" id="pdfFile" accept=".pdf">
    <button onclick="uploadPaper()">Upload Paper</button>
    <button class="cancel" onclick="closeAdmin()">Cancel</button>
    <div class="status" id="uploadStatus"></div>
  </div>
</div>

<script>
  let selectedPaperId = null;
  let papers = [];

  async function loadPapers() {
    try {
      const res = await fetch('/api/papers');
      const data = await res.json();
      papers = data.papers || [];
      renderPapers();
    } catch(e) {
      document.getElementById('paperList').innerHTML = 'Failed to load papers.';
    }
  }

  function renderPapers() {
    const list = document.getElementById('paperList');
    if (papers.length === 0) {
      list.innerHTML = '<p style="font-size:13px;color:#999;">No papers uploaded yet.</p>';
      return;
    }
    list.innerHTML = papers.map(p => `
      <div class="paper-item ${p.id === selectedPaperId ? 'active' : ''}" onclick="selectPaper('${p.id}', '${p.title}')">
        ${p.title}
      </div>
    `).join('');
  }

  function selectPaper(id, title) {
    selectedPaperId = id;
    document.getElementById('paperTitleDisplay').textContent = title;
    document.getElementById('noPaper').style.display = 'none';
    document.getElementById('chatSection').style.display = 'flex';
    document.getElementById('chatArea').innerHTML = '';
    renderPapers();
  }

  async function sendMessage() {
    if (!selectedPaperId) return alert('Please select a paper first.');
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message) return;
    input.value = '';

    addMessage('user', message);
    addMessage('assistant', 'Thinking...');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, paperId: selectedPaperId })
      });
      const data = await res.json();
      removeLastMessage();
      addMessage('assistant', data.reply || 'No response received.');
    } catch(e) {
      removeLastMessage();
      addMessage('assistant', 'Error: Could not get response.');
    }
  }

  function addMessage(role, content) {
    const area = document.getElementById('chatArea');
    area.innerHTML += `
      <div class="message ${role}">
        <div class="message-content">${content}</div>
      </div>
    `;
    area.scrollTop = area.scrollHeight;
  }

  function removeLastMessage() {
    const area = document.getElementById('chatArea');
    area.removeChild(area.lastChild);
  }

  function openAdmin() {
    document.getElementById('adminModal').classList.add('active');
  }

  function closeAdmin() {
    document.getElementById('adminModal').classList.remove('active');
    document.getElementById('uploadStatus').textContent = '';
  }

  async function uploadPaper() {
    const password = document.getElementById('adminPass').value;
    const title = document.getElementById('paperTitleInput').value;
    const file = document.getElementById('pdfFile').files[0];
    const status = document.getElementById('uploadStatus');

    if (!password || !title || !file) {
      status.textContent = 'Please fill all fields.';
      status.className = 'status error';
      return;
    }

    status.textContent = 'Uploading and processing PDF... this may take 1-2 minutes.';
    status.className = 'status';

    const formData = new FormData();
    formData.append('pdf', file);
    formData.append('title', title);

    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${password}` },
        body: formData
      });
      const data = await res.json();
      if (data.success) {
        status.textContent = `✓ Uploaded successfully! ${data.chunks} chunks processed.`;
        status.className = 'status success';
        loadPapers();
      } else {
        status.textContent = `Error: ${data.error}`;
        status.className = 'status error';
      }
    } catch(e) {
      status.textContent = 'Upload failed. Check your connection.';
      status.className = 'status error';
    }
  }

  loadPapers();
</script>

</body>
</html>
