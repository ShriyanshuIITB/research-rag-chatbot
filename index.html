<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Paper Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
    
    .header {
      background: #1a3a5c;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p { font-size: 12px; opacity: 0.8; }

    .container {
      display: flex;
      height: calc(100vh - 64px);
    }

    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e0e0e0;
      padding: 16px;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .paper-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 6px;
      font-size: 14px;
      border: 1px solid #e0e0e0;
      transition: all 0.2s;
    }
    .paper-item:hover { background: #f0f4f8; }
    .paper-item.active { background: #1a3a5c; color: white; border-color: #1a3a5c; }

    .admin-btn {
      width: 100%;
      padding: 8px;
      background: #f0f4f8;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 16px;
      color: #1a3a5c;
      font-weight: 500;
    }
    .admin-btn:hover { background: #e0e8f0; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .welcome {
      padding: 32px;
      background: white;
      margin: 24px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }
    .welcome h2 { color: #1a3a5c; margin-bottom: 8px; }
    .welcome p { color: #666; font-size: 14px; line-height: 1.6; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .message {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
    }
    .message.user { flex-direction: row-reverse; }
    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user .message-content {
      background: #1a3a5c;
      color: white;
    }
    .message.assistant .message-content {
      background: white;
      border: 1px solid #e0e0e0;
      color: #333;
    }

    .input-area {
      padding: 16px 24px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus { border-color: #1a3a5c; }
    .input-area button {
      padding: 10px 20px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .input-area button:hover { background: #15304d; }
