<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professor Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
    
    .header {
      background: #1a3a5c;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .prof-name { font-size: 14px; opacity: 0.85; }
    .logout-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .dashboard { padding: 32px; max-width: 900px; margin: 0 auto; }
    
    .upload-card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .upload-card h3 { color: #1a3a5c; margin-bottom: 20px; font-size: 17px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: #1a3a5c; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .toggle-row label { font-size: 14px; color: #444; font-weight: 500; }
    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

    .questions-list { margin-top: 8px; }
    .question-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .question-row input { flex: 1; }
    .question-row button {
      padding: 8px 12px;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .add-question-btn {
      padding: 8px 16px;
      background: #f0f4f8;
      color: #1a3a5c;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
    }
    .btn:hover { background: #15304d; }

    .status { padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 12px; }
    .status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; }
    .status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
    .status.loading { background: #eff6ff; color: #2563eb; border: 1px solid #93c5fd; }

    .link-box {
      background: #f0f4f8;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }
    .link-box span { font-size: 13px; color: #333; font-family: monospace; word-break: break-all; }
    .copy-btn {
      padding: 6px 14px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-left: 8px;
      white-space: nowrap;
    }

    .papers-section h2 { color: #1a3a5c; margin-bottom: 16px; }
    .papers-grid { display: grid; gap: 16px; }
    .paper-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .paper-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .paper-card h4 { color: #1a3a5c; margin-bottom: 4px; }
    .paper-card p { font-size: 13px; color: #666; }
    .paper-card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .open-btn {
      padding: 8px 16px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
    }
    .copy-link-btn {
      padding: 8px 16px;
      background: #f0f4f8;
      color: #1a3a5c;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .delete-btn {
      padding: 8px 16px;
      background: #fee2e2;
      color: #dc2626;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .processed-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .processed-badge.ready { background: #f0fdf4; color: #16a34a; }
    .processed-badge.processing { background: #fffbeb; color: #d97706; }
  </style>
</head>
<body>

<div class="header">
  <h1>📄 Research Chatbot Platform</h1>
  <div class="header-right">
    <span class="prof-name" id="headerProfName"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="dashboard">
  <div class="upload-card">
    <h3>📤 Upload New Paper</h3>
    
    <div class="form-group">
      <label>Paper Title</label>
      <input type="text" id="paperTitle" placeholder="e.g. Income Transfer Policies and Aggregate Welfare">
    </div>

    <div class="form-group">
      <label>Short Description (shown to officers/students)</label>
      <textarea id="paperDesc" placeholder="Brief description of what this chatbot helps with..."></textarea>
    </div>

    <div class="form-group">
      <label>PDF File</label>
      <input type="file" id="pdfFile" accept=".pdf">
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="enableContext">
      <label for="enableContext">Enable district/state context fields for officers</label>
    </div>

    <div class="form-group">
      <label>Quick Questions (officers will see these as clickable buttons)</label>
      <div class="questions-list" id="questionsList">
        <div class="question-row">
          <input type="text" placeholder="e.g. Which scheme gives highest welfare improvement?">
          <button onclick="removeQuestion(this)">✕</button>
        </div>
      </div>
      <button class="add-question-btn" onclick="addQuestion()">+ Add Question</button>
    </div>

    <button class="btn" onclick="uploadPaper()">Upload & Generate Chatbot Link</button>
    <div id="uploadStatus"></div>
    <div id="generatedLink" style="display:none;">
      <div class="link-box">
        <span id="chatLinkText"></span>
        <button class="copy-btn" onclick="copyLink()">Copy Link</button>
      </div>
    </div>
  </div>

  <div class="papers-section">
    <h2>Your Papers</h2>
    <div class="papers-grid" id="papersGrid">Loading...</div>
  </div>
</div>

<script>
  let professor = null;

  function init() {
    const stored = localStorage.getItem('professor');
    if (!stored) {
      window.location.href = '/';
      return;
    }
    professor = JSON.parse(stored);
    document.getElementById('headerProfName').textContent = professor.name + ' · ' + (professor.institution || '');
    loadPapers();
  }

  function logout() {
    localStorage.removeItem('professor');
    window.location.href = '/';
  }

  function addQuestion() {
    const list = document.getElementById('questionsList');
    const row = document.createElement('div');
    row.className = 'question-row';
    row.innerHTML = `
      <input type="text" placeholder="e.g. How much should poor vs rich households get?">
      <button onclick="removeQuestion(this)">✕</button>
    `;
    list.appendChild(row);
  }

  function removeQuestion(btn) {
    btn.parentElement.remove();
  }

  function getQuestions() {
    return Array.from(document.querySelectorAll('.question-row input'))
      .map(i => i.value.trim())
      .filter(q => q.length > 0);
  }

  async function uploadPaper() {
    const title = document.getElementById('paperTitle').value;
    const description = document.getElementById('paperDesc').value;
    const file = document.getElementById('pdfFile').files[0];
    const enableContext = document.getElementById('enableContext').checked;
    const quickQuestions = getQuestions();
    const status = document.getElementById('uploadStatus');

    if (!title || !file) {
      status.innerHTML = '<div class="status error">Please fill title and select a PDF file.</div>';
      return;
    }

    status.innerHTML = '<div class="status loading">⏳ Uploading PDF... do not close this page.</div>';
    document.getElementById('generatedLink').style.display = 'none';

    const formData = new FormData();
    formData.append('pdf', file);
    formData.append('title', title);
    formData.append('description', description);
    formData.append('enableContext', enableContext);
    formData.append('quickQuestions', JSON.stringify(quickQuestions));
    formData.append('professorId', professor.id);
    formData.append('profName', professor.name);
    formData.append('institution', professor.institution || '');

    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${professor.id}` },
        body: formData
      });

      const data = await res.json();

      if (data.success || data.paperId) {
        const link = `${window.location.origin}/chat?id=${data.paperId}`;
        status.innerHTML = `<div class="status success">✓ Paper uploaded! Chatbot is being processed in background.</div>`;
        document.getElementById('chatLinkText').textContent = link;
        document.getElementById('generatedLink').style.display = 'block';
        loadPapers();
      } else {
        status.innerHTML = `<div class="status error">Error: ${data.error}</div>`;
      }
    } catch(e) {
      status.innerHTML = '<div class="status success">⚠️ Upload likely succeeded! Check your papers below.</div>';
      setTimeout(() => loadPapers(), 3000);
    }
  }

  function copyLink() {
    const link = document.getElementById('chatLinkText').textContent;
    navigator.clipboard.writeText(link);
    document.querySelector('.copy-btn').textContent = 'Copied!';
    setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy Link', 2000);
  }

  async function loadPapers() {
    try {
      const res = await fetch(`/api/papers?professorId=${professor.id}`);
      const data = await res.json();
      const grid = document.getElementById('papersGrid');

      if (!data.papers || data.papers.length === 0) {
        grid.innerHTML = '<p style="color:#999;font-size:14px;">No papers uploaded yet.</p>';
        return;
      }

      grid.innerHTML = data.papers.map(p => `
        <div class="paper-card">
          <div class="paper-card-top">
            <div>
              <h4>${p.title}</h4>
              <p>${p.description || 'No description'} · ${new Date(p.created_at).toLocaleDateString('en-IN')}</p>
            </div>
            <span class="processed-badge ${p.processed ? 'ready' : 'processing'}">${p.processed ? '✓ Ready' : '⏳ Processing'}</span>
          </div>
          <div class="paper-card-actions">
            <button class="copy-link-btn" onclick="copyPaperLink('${p.id}')">Copy Link</button>
            <a class="open-btn" href="/chat?id=${p.id}" target="_blank">Open Chatbot</a>
            <button class="delete-btn" onclick="deletePaper('${p.id}', '${p.title}')">Delete</button>
          </div>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('papersGrid').innerHTML = '<p style="color:red;">Failed to load papers.</p>';
    }
  }

  function copyPaperLink(id) {
    const link = `${window.location.origin}/chat?id=${id}`;
    navigator.clipboard.writeText(link);
    alert('Link copied!');
  }

  async function deletePaper(id, title) {
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    try {
      const res = await fetch('/api/delete', {
        method: 'DELETE',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${professor.id}`
        },
        body: JSON.stringify({ paperId: id, professorId: professor.id })
      });
      const data = await res.json();
      if (data.success) {
        loadPapers();
      } else {
        alert('Error: ' + data.error);
      }
    } catch(e) {
      alert('Delete failed.');
    }
  }

  init();
</script>

</body>
</html>
